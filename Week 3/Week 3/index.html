
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Dev Lab Week 3</title>
   <!-- linking with external css -->
    <link rel="stylesheet" href="style.css">

    <!-- internal css -->
    <style>
        /*  Group selector */
        h1, h2, h3 {
            color: #2c3e50;
            text-transform: uppercase;
        }

        /*  Style the navigation menu */
        /*  Descendant selector */
        nav ul li {
            display: inline;
            margin-right: 20px;
        }

        nav ul li a {
            text-decoration: none;
            font-weight: bold;
        }

        /*  Pseudo-class selector */
        nav ul li a:hover {
            color: #d41d1d;
            text-decoration: none;

        }

        /*  Style section headings differently */
        /*  Class selector */
        .section-title {
            padding: 5px;
        }
    </style>
</head>
<body>

    <!--  Header (ID selector used here) -->
    <header id="header">
        <h1>Group 12 </h1>
        <p>Web Development Students</p>
    </header>

    <!--  Navigation menu with anchors -->
    <nav>
        <ul>
            <li><a href="#about">About</a></li>
            <li><a href="#skills">Skills</a></li>
            <li><a href="#routine">Daily Routine</a></li>
        </ul>
    </nav>

    <hr>

    <!--  About section -->
    <section id="about">

        <h2 class="section-title">About Me</h2>
        <p>We are  learning how to build responsive websites using HTML and CSS.</p>
        <img src="black.png" alt=" BMW" >
    </section>

    <!--  Skills section  -->
    <section id="skills">
        <h2 class="section-title">Skills</h2>
        <ul>
            <li>HTML5</li>
            <li>CSS3</li>
            <li>JavaScript</li>
        </ul>
    </section>

    <!--  Daily Routine section (Ordered list) -->
    <section id="routine">
        <h2 class="section-title">Daily Routine</h2>
        <ol>
            <!--  Inline CSS  -->
            <li>Wake up at 7:00 AM</li>
            <li>Attend Web Dev Lab</li>
            <li style="font-weight: bold;">Practice Coding</li>
        </ol>
    </section>

</body>
</html>
